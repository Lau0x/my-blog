# 跨服务器 NPM 部署 override
#
# 用法（在博客服务器上）：
#   docker compose -f docker-compose.yml -f docker-compose.prod-cross-host.yml up -d
#
# 场景：NPM（Nginx Proxy Manager）跑在另一台服务器上，博客在这台。
# 原理：
#   - 博客服务把 3000/1337 绑到公网 IP（需要防火墙只放行 NPM 服务器 IP）
#   - npm-net 改成本地桩网络，规避 external 依赖
#
# 安全前提：**必须配防火墙**（ufw/iptables）限制 3000/1337 只允许 NPM IP 访问，
# 否则 Strapi admin 暴露在公网上会被扫。

services:
  strapi:
    ports:
      - "1337:1337"

  nuxt:
    ports:
      - "3000:3000"

networks:
  npm-net:
    external: false
    name: blog-cross-host-stub
